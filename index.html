<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harsson Leftover Inventory</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
</head>

<body>
<div class="container">

<h1>🌸 Harsson Leftover Inventory</h1>
<div class="dashboard">

    <div class="card">
        <h3>📦 Available</h3>
        <p id="availableCount">0</p>
    </div>

    <div class="card">
        <h3>🌸 Total Stems</h3>
        <p id="totalStems">0</p>
    </div>

    <div class="card">
        <h3>🔄 Rotations Today</h3>
        <p id="rotationsToday">0</p>
    </div>

    <div class="card">
        <h3>🗑 Removed</h3>
        <p id="removedCount">0</p>
    </div>

</div>

<div class="top-bar">
<input type="text" id="search" placeholder="🔍 Search product, color, case or notes...">
<button id="activityBtn">📊 Activity Center</button>
<button id="exportInventoryBtn">📤 Export Inventory</button>
<button id="exportHistoryBtn">📤 Export Activity</button>
</div>

<div class="form">
<input type="text" id="product" placeholder="Product">
<input type="text" id="color" placeholder="Color">
<input type="number" id="quantity" placeholder="Quantity">
<input type="text" id="case" placeholder="Case #">

<div class="date-row">
<input type="date" id="date">
<button type="button" id="todayBtn">Today</button>
</div>

<input type="text" id="notes" placeholder="Notes">
<button id="addBtn">Add Leftover</button>
</div>

<h2>Current Inventory</h2>

<table>
<thead>
<tr>
<th>Product</th>
<th>Color</th>
<th>Qty</th>
<th>Case</th>
<th>Date</th>
<th>Notes</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>

</div>

<div id="activityModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2>📊 Activity Center</h2>
<button id="closeModal">X</button>
</div>

<table>
<thead>
<tr>
<th>Date / Time</th>
<th>Product</th>
<th>Color</th>
<th>Case</th>
<th>Before</th>
<th>Qty</th>
<th>After</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>
</div>
</div>

<div id="editModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2>✏️ Edit Leftover</h2>
<button id="closeEditModal">X</button>
</div>

<div class="form">
<input type="text" id="editProduct" placeholder="Product">
<input type="text" id="editColor" placeholder="Color">
<input type="number" id="editQuantity" placeholder="Quantity">
<input type="text" id="editCase" placeholder="Case #">
<input type="date" id="editDate">
<input type="text" id="editNotes" placeholder="Notes">
<button id="saveEditBtn">Save Changes</button>
</div>
</div>
</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
