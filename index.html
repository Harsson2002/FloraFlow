<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloraFlow</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#2e7d32">
</head>

<body>

<div class="container">

<h1>🌸 Harsson Leftover Inventory</h1>
<div class="dashboard">

    <div class="card">
        <h3>📦 Available</h3>
        <p id="availableCount">0</p>
    </div>

    <div class="card">
        <h3>🌸 Total Stems</h3>
        <p id="totalStems">0</p>
    </div>

    <div class="card">
        <h3>🔄 Rotations Today</h3>
        <p id="rotationsToday">0</p>
    </div>

    <div class="card">
        <h3>🗑 Removed</h3>
        <p id="removedCount">0</p>
    </div>

</div>

<div class="top-bar">
<input type="text" id="search" placeholder="🔍 Search product, color, case or notes...">
<button id="activityBtn">📊 Activity Center</button>
<button id="exportInventoryBtn">📤 Export Inventory</button>
<button id="exportHistoryBtn">📤 Export Activity</button>
</div>

<div class="form">
<input type="text" id="product" placeholder="Search Product" autocomplete="off">

<input type="text" id="color" placeholder="Color">
<input type="number" id="quantity" placeholder="Quantity">
<input type="text" id="case" placeholder="Case #">

<div class="date-row">
<input type="date" id="date">
<button type="button" id="todayBtn">Today</button>
</div>

<input type="text" id="notes" placeholder="Notes">

<label for="userSelect">Current User</label>
<select id="userSelect"></select>

<button id="addBtn">Add Leftover</button>
<div id="successMessage" style="
    display:none;
    margin-top:10px;
    padding:10px;
    background:#d4edda;
    color:#155724;
    border:1px solid #c3e6cb;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
">
    ✅ Leftover added successfully
</div>
</div>

<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
">
    <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
">
    <h2>Current Inventory</h2>

    <button
        type="button"
        id="toggleRemovedBtn"
        style="width:auto;"
    >
        Show Removed
    </button>
</div>

    <button
        type="button"
        id="toggleRemovedBtn"
        style="width:auto;"
    >
        Show Removed
    </button>
</div>
<table>
<thead>
<tr>
<th>Product</th>
<th>Color</th>
<th>Qty</th>
<th>Case</th>
<th>Date</th>
<th>Notes</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>

</div>

<div id="activityModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2>📊 Activity Center</h2>
<button id="closeModal">X</button>
</div>
<div class="activity-filters">

    <input
        type="text"
        id="historySearch"
        placeholder="🔍 Search by user, product, color or case..."
    >

    <div class="activity-date-filter">
        <input
            type="date"
            id="historyDate"
        >

        <button
            type="button"
            id="historyTodayBtn"
        >
            Today
        </button>
    </div>

</div>
<div id="activityTimeline"></div>
</div>
</div>


<div id="editModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2>✏️ Edit Leftover</h2>
<button id="closeEditModal">X</button>
</div>

<div class="form">
<input type="text" id="editProduct" placeholder="Product">
<input type="text" id="editColor" placeholder="Color">
<input type="number" id="editQuantity" placeholder="Quantity">
<input type="text" id="editCase" placeholder="Case #">
<input type="date" id="editDate">
<input type="text" id="editNotes" placeholder="Notes">
<button id="saveEditBtn">Save Changes</button>
</div>
</div>
</div>
<div id="productHistoryModal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h2>📜 Product History</h2>
            <button id="closeProductHistoryModal">X</button>
        </div>

        <div id="productHistorySummary">
            <p><strong>Product:</strong> <span id="historyProductName"></span></p>
            <p><strong>Color:</strong> <span id="historyProductColor"></span></p>
            <p><strong>Case:</strong> <span id="historyProductCase"></span></p>
            <p><strong>Current Qty:</strong> <span id="historyProductQty"></span></p>
        </div>

<div id="productHistoryTimeline"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.4.2/dist/css/tom-select.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.2/dist/js/tom-select.complete.min.js"></script>
<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
